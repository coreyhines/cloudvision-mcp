title = "cloudvision-mcp"

[extend]
useDefault = true

[allowlist]
description = "Env var placeholders, examples, and gitleaks artifacts"
paths = [
  '''\.gitleaks-baseline\.json$''',
  '''gitleaks-report\.json$''',
  '''^deploy/environment\.example$''',
  '''\.pre-commit-config\.yaml$''',
]
regexes = [
  '''\$\{[A-Z][A-Z0-9_]+\}''',
  '''\$\{env:[A-Z][A-Z0-9_]+\}''',
]
